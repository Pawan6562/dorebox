<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Doraemon Movies & Episodes - DoreBox</title>
    <meta name="description" content="Search all Doraemon movies and episodes in Hindi on DoreBox. Find by English or Indian title. Fuzzy search — even typos work!">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#020A24">
    <link rel="icon" href="https://iili.io/KXmopGj.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="style.css?v=5.0">
    <link rel="stylesheet" href="search.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="search-page">

    <!-- Fixed Search Header -->
    <div class="search-header">
        <button id="back-btn" onclick="history.back()" aria-label="Go Back" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon-inner"></i>
            <input type="text" id="main-search-input"
                placeholder="Search movies, episodes..."
                autocomplete="off" autofocus
                aria-label="Search Doraemon movies">
            <button id="voice-search-btn" class="voice-btn" title="Voice Search" style="display:none" aria-label="Voice Search">
                <i class="fas fa-microphone"></i>
            </button>
            <button id="clear-search" class="clear-search-btn hidden" aria-label="Clear search">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <main class="search-container">

        <!-- Filter Chips -->
        <div class="filter-row">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-th"></i> All</button>
            <button class="filter-btn" data-filter="movies"><i class="fas fa-film"></i> Movies</button>
            <button class="filter-btn" data-filter="episodes"><i class="fas fa-tv"></i> Episodes</button>
        </div>

        <!-- History Section -->
        <div id="search-history-section">
            <!-- Trending Searches -->
            <div class="trending-section">
                <h3 class="section-title"><i class="fas fa-fire"></i> Trending Now</h3>
                <div id="trending-searches" class="trending-chips-wrap"></div>
            </div>

            <!-- Recent Searches -->
            <div class="recent-section">
                <div class="section-header">
                    <h3 class="section-title"><i class="fas fa-history"></i> Recent Searches</h3>
                    <button id="clear-history-btn" class="clear-all-btn">Clear All</button>
                </div>
                <div id="history-list"></div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="search-results-section" class="hidden">
            <h3 id="results-count-heading" class="results-heading"></h3>
            <!-- Suggestions (shown on no-results) -->
            <div id="search-suggestions" class="hidden suggestions-wrap"></div>
            <!-- Results Grid -->
            <div id="results-grid" class="movie-grid search-results-grid"></div>
            <p id="no-results-msg" class="no-results-msg hidden">
                <i class="fas fa-search"></i><br>
                No results found. Try a different search term or check the spelling.
            </p>
        </div>

    </main>

    <script src="search.js"></script>
</body>
</html>
