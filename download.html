    <script>
    // Add meta badges to download page too

                    if (meta.year) badges.push(`<span class="meta-badge">${meta.year}</span>`);
                    if (meta.duration) badges.push(`<span class="meta-badge">${meta.duration}</span>`);

                    if (meta.genre) badges.push(`<span class="meta-badge">${meta.genre.split(',')[0].trim()}</span>`);
